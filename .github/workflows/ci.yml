name: CI - API Flask

on:
  push:
    branches:
      - main
  pull_request:   # 👈 MUITO IMPORTANTE
    branches:
      - main

jobs:
  build:
    name: CI - API Flask
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask pytest

      - name: Run tests
        run: pytest

      - name: Simular Deploy
        run: echo "Deploy realizado com sucesso"